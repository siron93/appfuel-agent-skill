interface:
  display_name: "App Fuel Data"
  short_description: "Research apps, ads, reels, and saved findings"
  brand_color: "#FF3D19"
  default_prompt: "Use $appfuel-data to find Health & Fitness apps running ads, then save the strongest examples to a collection."

dependencies:
  tools:
    - type: "mcp"
      value: "appfuel-data"
      description: "Hosted App Fuel MCP server authenticated with OAuth browser login"

policy:
  allow_implicit_invocation: true
